services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aurum-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aurum_commerce}
      POSTGRES_USER: ${POSTGRES_USER:-aurum}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aurum}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aurum-redis
    restart: unless-stopped
    command: redis-server --maxmemory 4gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ChromaDB ────────────────────────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: aurum-chromadb
    restart: unless-stopped
    environment:
      CHROMA_SERVER_AUTH_CREDENTIALS_PROVIDER: chromadb.auth.token.TokenConfigServerAuthCredentialsProvider
      CHROMA_SERVER_AUTH_PROVIDER: chromadb.auth.token.TokenAuthServerProvider
      CHROMA_AUTH_TOKEN_TRANSPORT_HEADER: AUTHORIZATION
      ANONYMIZED_TELEMETRY: "false"
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8001:8000"

  # ── API (FastAPI) ────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: aurum-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    volumes:
      - .:/app
      - /home/toe/aurum-commerce-os/data:/app/data
    ports:
      - "8000:8000"
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Celery Worker (Agent Orchestrator) ──────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: aurum-worker
    restart: unless-stopped
    depends_on:
      - redis
      - postgres
    env_file: .env
    volumes:
      - .:/app
    command: celery -A core.tasks.celery_app worker --loglevel=info --concurrency=8 -Q default,agents,reports

  # ── Celery Beat (Scheduler) ──────────────────────────────────────────────────
  beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: aurum-beat
    restart: unless-stopped
    depends_on:
      - redis
    env_file: .env
    volumes:
      - .:/app
    command: celery -A core.tasks.celery_app beat --loglevel=info --scheduler celery.beat:PersistentScheduler

  # ── Flower (Task Monitor) ───────────────────────────────────────────────────
  flower:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: aurum-flower
    restart: unless-stopped
    depends_on:
      - redis
    env_file: .env
    ports:
      - "5555:5555"
    command: celery -A core.tasks.celery_app flower --port=5555

  # ── Dashboard (Next.js) ─────────────────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: aurum-dashboard
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  redis_data:
  chroma_data:

networks:
  default:
    name: aurum-network
